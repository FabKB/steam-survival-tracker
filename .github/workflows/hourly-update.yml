name: Hourly Steam + Twitch ingestion

on:
  # Toutes les heures à 5 minutes après l'heure pile
  # (évite le rush à HH:00 sur les runners GitHub)
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run hourly ingestion
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_SECRET: ${{ secrets.TWITCH_SECRET }}
        run: python ingest_steam.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: hourly snapshot $(date -u +%Y-%m-%dT%HZ)"
            # Retry push en cas de conflit (rare mais possible si 2 runs se chevauchent)
            for i in 1 2 3; do
              git pull --rebase && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
          fi
