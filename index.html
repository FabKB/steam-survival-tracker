  <style>
    html, body { margin: 0; padding: 0; background: #050403; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    #root { min-height: 100vh; }
    .loader {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #998a78; font-size: 14px;
      font-family: ui-monospace, "JetBrains Mono", monospace; letter-spacing: 0.1em;
    }
    .loader::before {
      content: '\25B2'; color: #FF8A4C; margin-right: 12px;
      animation: pulse 1.5s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .error-box {
      max-width: 700px; margin: 60px auto; padding: 24px;
      background: rgba(220, 88, 88, 0.1); border: 1px solid rgba(220, 88, 88, 0.4);
      border-radius: 8px; color: #E89090; font-family: monospace;
    }
  </style>

  <div id="root">
    <div class="loader">CHARGEMENT</div>

  <script>
    window.addEventListener('error', (e) => {
      const root = document.getElementById('root');
      if (root && root.querySelector('.loader')) {

let HISTORY_FETCHED = false;

// Tente de charger les données fraîches depuis data/history.json
// Si ça marche (servi par un vrai serveur web ou GitHub Pages), on remplace
// les données embarquées. Sinon (fichier ouvert en local), on garde le fallback.
async function fetchHistory() {
  try {
    const response = await fetch('data/history.json', { cache: 'no-cache' });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const fresh = await response.json();
    if (fresh && Object.keys(fresh).length > 0) {
      // Normaliser : enlever twitch_viewers/channels pour ne garder que ccu
      const normalized = {};
      for (const [appid, entries] of Object.entries(fresh)) {
        normalized[appid] = entries
          .filter(e => e.ccu != null)
          .map(e => ({ date: e.date, ccu: e.ccu }));
      }
      HISTORY = normalized;
      HISTORY_FETCHED = true;
      console.log('[tracker] Loaded fresh history from data/history.json');
      // Force re-render
      window.dispatchEvent(new CustomEvent('history-updated'));
    }
  } catch (e) {
    console.log('[tracker] Using embedded fallback history (', e.message, ')');
  }
}

const fmt = (n) => n == null ? '–' : n.toLocaleString('fr-FR');
const fmtCompact = (n) => {
  if (n == null) return '–';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return n.toString();
};

// Calcul des stats dérivées de l'historique
function getStats(appid) {
  const data = HISTORY[String(appid)];
  if (!data || data.length === 0) return null;
  const ccus = data.map(d => d.ccu);
  const recent7 = ccus.slice(-7);
  const prev7 = ccus.slice(-14, -7);
  const avg7 = recent7.reduce((a, b) => a + b, 0) / recent7.length;
  const avgPrev7 = prev7.reduce((a, b) => a + b, 0) / Math.max(prev7.length, 1);
  const wow = ((avg7 - avgPrev7) / avgPrev7) * 100;
  const current = ccus[ccus.length - 1];
  return { current, avg7, wow, series: data };
}

// ============ SPARKLINE ============
function Sparkline({ data, color = '#FF8A4C', width = 100, height = 32 }) {
  if (!data || data.length < 2) return null;
  const values = data.map(d => d.ccu);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const points = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(' ');

  const area = `0,${height} ${points} ${width},${height}`;
  const gradientId = `grad-${Math.random().toString(36).slice(2, 9)}`;

  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={gradientId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.4" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <polygon points={area} fill={`url(#${gradientId})`} />
      <polyline points={points} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={width} cy={height - ((values[values.length - 1] - min) / range) * height} r="2.5" fill={color} />
    </svg>
  );
}

                </div>
                <ResponsiveContainer width="100%" height={Math.max(400, filtered.length * 36)}>
                  <BarChart data={chartData} layout="vertical" margin={{ left: 20, right: 40, top: 10, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" horizontal={false} />
                    <XAxis type="number" stroke="#998a78" fontSize={11} tickFormatter={fmt} />
                    <YAxis type="category" dataKey="name" stroke="#998a78" fontSize={12} width={160} />
                    <Tooltip
                      cursor={{ fill: 'rgba(255, 138, 76, 0.06)' }}
                      contentStyle={{ background: 'rgba(20, 16, 12, 0.95)', border: '1px solid rgba(255, 138, 76, 0.3)', borderRadius: 8, color: '#e8dcc8' }}
                      formatter={(v) => fmt(v)}
                      labelFormatter={(label, payload) => payload?.[0]?.payload?.fullName || label}
                    />
                    <Bar dataKey={chartMetric} fill="#FF8A4C" radius={[0, 3, 3, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              </div>
            ) : (
              <div style={{
                background: 'rgba(20, 16, 12, 0.6)', border: '1px solid rgba(255, 138, 76, 0.12)',
                borderRadius: 12, overflow: 'hidden', backdropFilter: 'blur(10px)',
              }}>
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', minWidth: 1700 }}>
                    <thead>
                      <tr style={{ background: 'rgba(255, 138, 76, 0.05)', borderBottom: '1px solid rgba(255, 138, 76, 0.15)' }}>
                        <th style={{ padding: '14px 16px', textAlign: 'left', width: 260 }}>
                          <button className="sort-btn" onClick={() => handleSort('name')}>Jeu <SortIcon k="name" /></button>
                        </th>
                        <th style={{ padding: '14px 12px', textAlign: 'center', width: 130 }}>
                          <span className="sort-btn" style={{ cursor: 'default' }}>Tendance 60j</span>
                        </th>
                        <th style={{ padding: '14px 12px', textAlign: 'right' }}>
                          <button className="sort-btn" onClick={() => handleSort('peakAll')}>Peak all-time <SortIcon k="peakAll" /></button>
                        </th>
                        <th style={{ padding: '14px 12px', textAlign: 'right' }}>
                          <button className="sort-btn" onClick={() => handleSort('peak24h')}>Peak 24h <SortIcon k="peak24h" /></button>
                        </th>
                        <th style={{ padding: '14px 12px', textAlign: 'right' }}>
                          <button className="sort-btn" onClick={() => handleSort('avg30')}>Avg 30j <SortIcon k="avg30" /></button>
                        </th>
                        <th style={{ padding: '14px 12px', textAlign: 'right' }}><span className="sort-btn" style={{ cursor: 'default' }}>WoW</span></th>
                        <th style={{ padding: '14px 12px', textAlign: 'center' }}><span className="sort-btn" style={{ cursor: 'default' }}>Release</span></th>
                        <th style={{ padding: '14px 12px', textAlign: 'center' }}><span className="sort-btn" style={{ cursor: 'default' }}>Mobile</span></th>
                        <th style={{ padding: '14px 12px', textAlign: 'center' }}><span className="sort-btn" style={{ cursor: 'default' }}>Console</span></th>
                        <th style={{ padding: '14px 12px', textAlign: 'right' }}><button className="sort-btn" onClick={() => handleSort('twitchAvg')}>Twitch avg <SortIcon k="twitchAvg" /></button></th>
                        <th style={{ padding: '14px 12px', textAlign: 'center' }}><span className="sort-btn" style={{ cursor: 'default' }}>PvP</span></th>
                        <th style={{ padding: '14px 16px', width: 32 }}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((g, idx) => {
                        const pvpStyle = PVP_COLORS[g.pvp];
                        const stats = getStats(g.appid);
                        const trendColor = stats?.wow > 2 ? '#B8E596' : stats?.wow < -2 ? '#E89090' : '#F7D77E';
                        return (
                          <tr key={g.appid} className="row-hover" onClick={() => setSelectedGame(g)}
                            style={{ borderBottom: idx < filtered.length - 1 ? '1px solid rgba(255,255,255,0.04)' : 'none' }}>
                            <td style={{ padding: '12px 16px' }}>
                              <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
                                <div className="game-thumb">
                                  <img
                                    src={`https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${g.appid}/header.jpg`}
                                    alt={g.name} loading="lazy"
                                    onError={(e) => { e.target.style.display = 'none'; }}
                                  />
                                </div>
                                <div style={{ minWidth: 0 }}>
                                  <div style={{ fontWeight: 600, fontSize: 14, color: '#fff5e8', marginBottom: 2 }}>
                                    {g.name}
                                  </div>
                                  <div className="mono" style={{ fontSize: 10, color: '#998a78' }}>
                                    #{g.appid}
                                  </div>
                                </div>
                              </div>
                            </td>
                            <td style={{ padding: '12px', textAlign: 'center' }}>
                              {stats && <Sparkline data={stats.series} color={trendColor} width={110} height={32} />}
                            </td>
                            <td className="mono" style={{ padding: '12px', textAlign: 'right', fontSize: 13 }}>
                              <div style={{ color: '#fff5e8', fontWeight: 600 }}>{fmt(g.peakAll)}</div>
                              <div style={{ color: '#998a78', fontSize: 10, marginTop: 2 }}>{g.peakDate}</div>
                            </td>
                            <td className="mono" style={{ padding: '12px', textAlign: 'right', fontSize: 13, color: '#c5b8a3' }}>
                              {fmt(g.peak24h)}
                            </td>
                            <td className="mono" style={{ padding: '12px', textAlign: 'right', fontSize: 13, color: '#c5b8a3' }}>
                              {fmt(g.avg30)}
                            </td>
                            <td className="mono" style={{ padding: '12px', textAlign: 'right', fontSize: 13, color: trendColor, fontWeight: 600 }}>
                              {stats ? `${stats.wow > 0 ? '+' : ''}${stats.wow.toFixed(1)}%` : '–'}
                            </td>
                            <td style={{ padding: '12px', textAlign: 'center', fontSize: 12, color: '#c5b8a3', whiteSpace: 'nowrap' }} className="mono">
                              {g.releaseLabel || '—'}
                            </td>
                            <td style={{ padding: '12px', textAlign: 'center' }}>
                              {g.mobile && g.mobile !== 'no' ? (
                                <span style={{
                                  display: 'inline-block', padding: '4px 10px', borderRadius: 4,
                                  fontSize: 11, fontWeight: 500,
                                  background: MOBILE_COLORS[g.mobile].bg,
                                  border: `1px solid ${MOBILE_COLORS[g.mobile].border || 'transparent'}`,
                                  color: MOBILE_COLORS[g.mobile].text,
                                }}>
                                  {MOBILE_LABELS[g.mobile]}
                                </span>
                              ) : <span style={{ color: '#7a6d5e' }}>—</span>}
                            </td>
                            <td style={{ padding: '12px', textAlign: 'center' }}>
                              {g.console && g.console !== 'no' ? (
                                <span title={g.consoleLabel} style={{
                                  display: 'inline-block', padding: '4px 10px', borderRadius: 4,
                                  fontSize: 11, fontWeight: 500,
                                  background: CONSOLE_COLORS[g.console].bg,
                                  border: `1px solid ${CONSOLE_COLORS[g.console].border || 'transparent'}`,
                                  color: CONSOLE_COLORS[g.console].text,
                                  cursor: 'help',
                                }}>
                                  {g.console === 'ps5_xb_series' ? 'PS5 / XSX' : 'PS4 / Xbox'}
                                </span>
                              ) : <span style={{ color: '#7a6d5e' }}>—</span>}
                            </td>
                            <td className="mono" style={{ padding: '12px', textAlign: 'right', fontSize: 13 }}>
                              <div style={{ color: g.twitchAvg > 5000 ? '#FFB088' : g.twitchAvg > 1000 ? '#fff5e8' : '#998a78', fontWeight: 600 }}>
                                {fmt(g.twitchAvg)}
                              </div>
                              <div style={{ color: '#7a6d5e', fontSize: 9, marginTop: 2, maxWidth: 110, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }} title={g.twitchNote}>
                                {g.twitchNote}
                              </div>
                            </td>
                            <td style={{ padding: '12px', textAlign: 'center' }}>
                              <span style={{
                                display: 'inline-block', padding: '4px 10px', borderRadius: 4,
                                fontSize: 11, fontWeight: 500,
                                background: pvpStyle.bg, border: `1px solid ${pvpStyle.border}`, color: pvpStyle.text,
                                whiteSpace: 'nowrap',
                              }}>
                                {g.pvpLabel}
                              </span>
                            </td>
                            <td style={{ padding: '12px 16px', textAlign: 'right', color: '#FFB088', opacity: 0.5 }}>
                              <ChevronRight size={16} />
                            </td>
                          </tr>
                        );
                      })}
                      {filtered.length === 0 && (
                        <tr>
                          <td colSpan={12} style={{ padding: 40, textAlign: 'center', color: '#998a78' }}>
                            Aucun jeu ne correspond aux filtres.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            <footer style={{
              marginTop: 40, paddingTop: 24, borderTop: '1px solid rgba(255,255,255,0.05)',
              color: '#7a6d5e', fontSize: 12, lineHeight: 1.7,
            }}>
              <div className="mono" style={{ marginBottom: 6, color: '#998a78', textTransform: 'uppercase', letterSpacing: '0.1em', fontSize: 10 }}>
                Méthodologie
              </div>
              CCU all-time / peaks issus de SteamCharts/SteamDB (saisie manuelle).
              <strong style={{ color: '#998a78' }}> Historique 60 jours simulé pour démo</strong> — sera remplacé par les données réelles
              une fois <code className="mono" style={{ background: 'rgba(255,138,76,0.1)', padding: '1px 6px', borderRadius: 3, color: '#FFB088' }}>ingest_steam.py</code> lancé quotidiennement.
              <br /><br />
              <strong style={{ color: '#998a78' }}>Viewers Twitch</strong> : moyenne sur 7 jours (mai 2026, sources TwitchTracker/Twitchstats).
              Rust confirmé (top 25 mondial Twitch); autres jeux = ordres de grandeur — affiner via API Twitch Helix (cf. script).
              <br />
              <strong style={{ color: '#998a78' }}>Mobile</strong> : "Crossplay" = même monde que PC; "Standalone" = univers séparé géré par un partenaire.
              <strong style={{ color: '#998a78' }}> Console</strong> : "PS4/Xbox" = anciennes gen; "PS5/XSX" = nouvelle gen native.
              Chiffres Steam uniquement pour le CCU — excluent consoles et clients alternatifs.
            </footer>
          </>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
